name: Build DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (leave empty to use MARKETING_VERSION from project)"
        required: false
        default: ""
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "assets/**"
      - ".github/workflows/sync-sponsors-svg.yml"
      - ".github/workflows/update-sponsors.yml"

permissions:
  contents: write

concurrency:
  group: build-dmg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show build environment
        run: |
          xcodebuild -version
          sw_vers

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(grep "MARKETING_VERSION" MiaoYan.xcodeproj/project.pbxproj | head -1 | sed 's/.*= \(.*\);/\1/' | tr -d ' ')
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="${BASE}-${SHORT_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build DMG (unsigned, ad-hoc)
        run: |
          chmod +x scripts/build.sh
          # Run build.sh but tolerate the optional Sparkle sign_update step
          # failing on CI (no EdDSA private key in Keychain). The DMG/ZIP is
          # produced before that step, so the artifacts already exist.
          set +e
          ./scripts/build.sh "${{ steps.ver.outputs.version }}"
          STATUS=$?
          set -e
          if [ $STATUS -ne 0 ]; then
            echo "build.sh exited with $STATUS — checking whether DMG/ZIP were produced before the failure..."
            ls -lh "$HOME/Downloads" || true
            if [ -f "$HOME/Downloads/MiaoYan.dmg" ] && [ -f "$HOME/Downloads/MiaoYan_V${{ steps.ver.outputs.version }}.zip" ]; then
              echo "DMG and ZIP exist — treating Sparkle signing failure as non-fatal."
            else
              echo "Artifacts missing — failing the job."
              exit $STATUS
            fi
          fi

      - name: Collect artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p dist
          cp "$HOME/Downloads/MiaoYan.dmg" "dist/MiaoYan_V${VERSION}.dmg"
          cp "$HOME/Downloads/MiaoYan_V${VERSION}.zip" "dist/MiaoYan_V${VERSION}.zip"
          ls -lh dist
          shasum -a 256 dist/* > dist/SHASUMS256.txt
          cat dist/SHASUMS256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MiaoYan-${{ steps.ver.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

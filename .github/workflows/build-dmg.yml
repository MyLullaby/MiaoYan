name: Build DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (leave empty to use MARKETING_VERSION from project)"
        required: false
        default: ""
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "assets/**"
      - ".github/workflows/sync-sponsors-svg.yml"
      - ".github/workflows/update-sponsors.yml"

permissions:
  contents: write

concurrency:
  group: build-dmg-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Show build environment
        run: |
          xcodebuild -version
          sw_vers

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(grep "MARKETING_VERSION" MiaoYan.xcodeproj/project.pbxproj | head -1 | sed 's/.*= \(.*\);/\1/' | tr -d ' ')
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="${BASE}-${SHORT_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build DMG (CI, unsigned)
        run: |
          chmod +x scripts/build-ci.sh
          ./scripts/build-ci.sh "${{ steps.ver.outputs.version }}"

      - name: Collect artifacts
        id: artifacts
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          mkdir -p dist
          cp "build/dist/MiaoYan_V${VERSION}.dmg" "dist/"
          ls -lh dist
          shasum -a 256 dist/* > dist/SHASUMS256.txt
          cat dist/SHASUMS256.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MiaoYan-${{ steps.ver.outputs.version }}
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

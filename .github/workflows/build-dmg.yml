name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version override (leave empty to use MARKETING_VERSION from project)"
        required: false
        default: ""
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "**/*.md"
      - "assets/**"
      - ".github/workflows/sync-sponsors-svg.yml"
      - ".github/workflows/update-sponsors.yml"

permissions:
  contents: write

concurrency:
  group: build-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(grep "MARKETING_VERSION" MiaoYan.xcodeproj/project.pbxproj | head -1 | sed 's/.*= \(.*\);/\1/' | tr -d ' ')
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="${BASE}-${SHORT_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build DMG (CI, unsigned)
        run: |
          chmod +x scripts/build-ci.sh
          ./scripts/build-ci.sh "${{ steps.ver.outputs.version }}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiaoYan-macos-${{ steps.ver.outputs.version }}
          path: build/dist/*
          if-no-files-found: error

  build-ios:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.2
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.2"

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            BASE=$(grep "MARKETING_VERSION" MiaoYan.xcodeproj/project.pbxproj | head -1 | sed 's/.*= \(.*\);/\1/' | tr -d ' ')
            SHORT_SHA="${GITHUB_SHA::7}"
            VERSION="${BASE}-${SHORT_SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

      - name: Build IPA (CI, unsigned)
        run: |
          chmod +x scripts/build-ci-ios.sh
          ./scripts/build-ci-ios.sh "${{ steps.ver.outputs.version }}"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiaoYan-ios-${{ steps.ver.outputs.version }}
          path: build/dist/*
          if-no-files-found: error

  release:
    needs: [build-macos, build-ios]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          cp artifacts/MiaoYan-macos-*/MiaoYan_V*.dmg release/ || true
          cp artifacts/MiaoYan-ios-*/MiaoYanMobile_V*.ipa release/ || true
          ls -lh release/
          if [ -n "$(ls release/)" ]; then
            shasum -a 256 release/* > release/SHASUMS256.txt
            cat release/SHASUMS256.txt
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
